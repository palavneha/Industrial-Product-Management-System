<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIDENT</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Inter, sans-serif;
            background: #f5f5f5;
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}
    <main class="max-w-7xl mx-auto px-8 py-8">

        <div class="mb-8">
            <h1 class="text-4xl font-bold">Tender Intelligence</h1>
            <p class="text-gray-500 mt-2">Upload a tender PDF to get matched products and a proposal.</p>
        </div>

        <div class="bg-white rounded-xl border p-8 max-w-xl">
            <form id="tenderForm" method="POST" enctype="multipart/form-data">
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-2">Upload Tender PDF</label>
                    <input type="file" name="tender_pdf" accept=".pdf" required
                        class="w-full border rounded-lg px-4 py-2 text-gray-700">
                </div>
                <button type="submit" id="submitBtn"
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold w-full hover:bg-blue-700">
                    Analyze Tender
                </button>
            </form>

            <!-- Spinner (hidden by default) -->
            <div id="loadingState" class="hidden mt-6 text-center">
                <div class="flex justify-center mb-3">
                    <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                </div>
                <p class="text-gray-600 font-medium">Analyzing tender document...</p>
                <p class="text-gray-400 text-sm mt-1">Extracting text and matching products with AI</p>
            </div>
        </div>

    </main>

    <script>
        document.getElementById('tenderForm').addEventListener('submit', function () {
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Analyzing...';
            document.getElementById('submitBtn').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('loadingState').classList.remove('hidden');
        });
    </script>
</body>

</html>
