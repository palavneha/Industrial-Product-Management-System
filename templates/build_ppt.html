<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Build Custom PPT — TRIDENT</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Inter, sans-serif;
            background: #f5f5f5;
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}
    <main class="max-w-5xl mx-auto px-8 py-8">

        <div class="mb-8">
            <h1 class="text-4xl font-bold">Build Custom Presentation</h1>
            <p class="text-gray-500 mt-2">Select exactly which services and products to include.</p>
        </div>

        <form method="POST" action="/generate-custom-ppt">

            <div class="bg-white rounded-xl border p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Services</h2>
                    <button type="button" onclick="toggleAll('service_ids', this)"
                        class="text-blue-600 text-sm font-medium">Select All</button>
                </div>
                <div class="grid md:grid-cols-2 gap-3">
                    {% for s in services %}
                    <label class="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                        <input type="checkbox" name="service_ids" value="{{ s.id }}" class="w-4 h-4">
                        <span>{{ s.name }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="bg-white rounded-xl border p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Manufacturing Products</h2>
                    <button type="button" onclick="toggleAll('product_ids', this)"
                        class="text-blue-600 text-sm font-medium">Select All</button>
                </div>
                <div class="grid md:grid-cols-2 gap-3">
                    {% for p in products %}
                    <label class="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                        <input type="checkbox" name="product_ids" value="{{ p.id }}" class="w-4 h-4">
                        <span>{{ p.name }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <button type="submit"
                class="bg-blue-600 text-white px-8 py-4 rounded-lg font-semibold hover:bg-blue-700 w-full">
                Generate Selected PPT
            </button>
        </form>

    </main>

    <script>
        function toggleAll(name, btn) {
            const boxes = document.querySelectorAll(`input[name="${name}"]`);
            const allChecked = [...boxes].every(b => b.checked);
            boxes.forEach(b => b.checked = !allChecked);
            btn.textContent = allChecked ? 'Select All' : 'Deselect All';
        }
    </script>
</body>

</html>
