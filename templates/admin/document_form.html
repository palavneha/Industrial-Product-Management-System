<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIDENT — {{ 'Edit' if doc else 'Add' }} Document</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Inter,sans-serif;background:#f5f5f5;}
</style>
</head>
<body>
{% include 'navbar.html' %}

<main class="max-w-xl mx-auto px-8 py-8">

    <div class="mb-8">
        <a href="/admin/documents" class="text-sm text-gray-400 hover:text-gray-600">← Back to documents</a>
        <h1 class="text-4xl font-bold mt-2">{{ 'Edit' if doc else 'Add' }} Document</h1>
    </div>

    <form method="POST" class="bg-white rounded-xl border p-6 space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Document Type</label>
            <input type="text" name="document_type" required list="doc-type-suggestions"
                value="{{ doc.document_type if doc else '' }}"
                class="border p-3 rounded w-full" />
            <datalist id="doc-type-suggestions">
                <option value="PARTNERSHIP_JV_HUF_LLP_CERTIFICATE">
                <option value="SOLE_PROPRIETOR_UNDERTAKING">
                <option value="ANNEXURE_V_A">
            </datalist>
            <p class="text-xs text-gray-400 mt-1">
                Use the exact tag a tender's compliance requirement expects (e.g. the ones suggested above)
                so it gets matched automatically during a tender check.
            </p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Document Number</label>
            <input type="text" name="document_number"
                value="{{ doc.document_number if doc else '' }}"
                class="border p-3 rounded w-full" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Issuing Authority</label>
            <input type="text" name="issuing_authority"
                value="{{ doc.issuing_authority if doc else '' }}"
                class="border p-3 rounded w-full" />
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Valid From</label>
                <input type="date" name="valid_from"
                    value="{{ doc.valid_from.isoformat() if doc and doc.valid_from else '' }}"
                    class="border p-3 rounded w-full" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Valid Until</label>
                <input type="date" name="valid_until"
                    value="{{ doc.valid_until.isoformat() if doc and doc.valid_until else '' }}"
                    class="border p-3 rounded w-full" />
            </div>
        </div>

        <label class="flex items-center gap-2 text-sm text-gray-700">
            <input type="checkbox" name="has_document"
                {% if doc and doc.has_document %}checked{% endif %} />
            Document is on file
        </label>

        <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded font-semibold">
            {{ 'Save Changes' if doc else 'Add Document' }}
        </button>

    </form>

</main>
</body>
</html>
