<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIDENT — {{ 'Edit' if year else 'Add' }} Financial Year</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Inter,sans-serif;background:#f5f5f5;}
</style>
</head>
<body>
{% include 'navbar.html' %}

<main class="max-w-xl mx-auto px-8 py-8">

    <div class="mb-8">
        <a href="/admin/financial-years" class="text-sm text-gray-400 hover:text-gray-600">← Back to financial years</a>
        <h1 class="text-4xl font-bold mt-2">{{ 'Edit' if year else 'Add' }} Financial Year</h1>
    </div>

    <form method="POST" class="bg-white rounded-xl border p-6 space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Financial Year End (e.g. 2024 = FY 2023-24)</label>
            <input type="number" name="financial_year_end" required min="1900" max="2100"
                value="{{ year.financial_year_end if year else '' }}"
                class="border p-3 rounded w-full" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Annual Turnover (Crore)</label>
            <input type="number" step="0.01" name="annual_turnover_crore" required
                value="{{ year.annual_turnover_crore if year else '' }}"
                class="border p-3 rounded w-full" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Net Worth (Crore)</label>
            <input type="number" step="0.01" name="net_worth_crore"
                value="{{ year.net_worth_crore if year is not none and year.net_worth_crore is not none else '' }}"
                class="border p-3 rounded w-full" />
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Working Capital (Crore)</label>
            <input type="number" step="0.01" name="working_capital_crore"
                value="{{ year.working_capital_crore if year is not none and year.working_capital_crore is not none else '' }}"
                class="border p-3 rounded w-full" />
        </div>

        <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded font-semibold">
            {{ 'Save Changes' if year else 'Add Financial Year' }}
        </button>

    </form>

</main>
</body>
</html>
